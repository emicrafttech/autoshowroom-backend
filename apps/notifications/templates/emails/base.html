<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="supported-color-schemes" content="light" />
    <title>{% block title %}{{ brand_name }}{% endblock %}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f3f4f6;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #171717;
        -webkit-font-smoothing: antialiased;
      }
      .wrapper {
        width: 100%;
        background: #f3f4f6;
        padding: 40px 16px;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid #e5e7eb;
        box-shadow: 0 1px 2px rgba(15, 15, 18, 0.04);
      }
      .header {
        padding: 28px 32px 8px;
      }
      .header-table {
        width: 100%;
        border-collapse: collapse;
      }
      .logo {
        display: block;
        width: 148px;
        height: auto;
        border: 0;
      }
      .hero {
        padding: 12px 32px 0;
      }
      .hero-top {
        padding-top: 8px;
      }
      .eyebrow {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #525252;
        margin: 0 0 12px;
      }
      .title {
        font-size: 28px;
        line-height: 1.2;
        font-weight: 800;
        letter-spacing: -0.03em;
        margin: 0 0 14px;
        color: #0f0f12;
      }
      .title-sm {
        font-size: 24px;
      }
      .subtitle {
        font-size: 15px;
        line-height: 1.65;
        color: #525252;
        margin: 0;
      }
      .content {
        padding: 24px 32px 8px;
        font-size: 15px;
        line-height: 1.65;
        color: #404040;
      }
      .content p {
        margin: 0 0 16px;
      }
      .section {
        padding: 0 32px 20px;
      }
      .note {
        padding: 0 32px 12px;
        margin: 0;
        color: #575757;
        font-size: 13px;
        line-height: 1.6;
      }
      .btn-primary {
        display: inline-block;
        background: {{ accent_color }};
        color: {{ accent_text_color }} !important;
        text-decoration: none;
        font-weight: 800;
        font-size: 14px;
        line-height: 1;
        padding: 15px 24px;
        border-radius: 999px;
        border: 1px solid #9db820;
      }
      .btn-secondary {
        display: inline-block;
        background: #ffffff;
        color: #0f0f12 !important;
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
        line-height: 1;
        padding: 14px 24px;
        border-radius: 999px;
        border: 1px solid #d4d4d8;
        margin-left: 10px;
      }
      .actions {
        padding: 8px 32px 28px;
      }
      .card {
        margin: 0 32px 16px;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        overflow: hidden;
        background: #f9fafb;
      }
      .card-body {
        padding: 20px 22px;
      }
      .card-title {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 800;
        color: #0f0f12;
      }
      .card-text {
        margin: 0;
        font-size: 15px;
        line-height: 1.65;
        color: #404040;
      }
      .card-text + .card-text,
      .card-row + .card-row,
      .card-title + .card-text {
        margin-top: 12px;
      }
      .card-row {
        margin: 0;
        font-size: 14px;
        line-height: 1.65;
        color: #404040;
      }
      .detail-row {
        margin: 0 0 14px;
        font-size: 14px;
        line-height: 1.65;
        color: #404040;
      }
      .detail-row:last-child {
        margin-bottom: 0;
      }
      .detail-icon {
        display: inline-block;
        width: 22px;
        margin-right: 8px;
      }
      .vehicle-title {
        margin: 0 0 6px;
        font-size: 16px;
        font-weight: 800;
        color: #0f0f12;
      }
      .vehicle-specs {
        margin: 0 0 10px;
        font-size: 13px;
        color: #575757;
      }
      .price {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
        color: {{ brand_green }};
      }
      .muted {
        color: #575757;
        font-size: 13px;
        line-height: 1.6;
      }
      .link-break {
        word-break: break-all;
      }
      .footer {
        padding: 24px 32px 32px;
        border-top: 1px solid #ececec;
        background: #fafafa;
        text-align: center;
      }
      .footer p {
        margin: 0 0 10px;
        font-size: 12px;
        line-height: 1.6;
        color: #575757;
      }
      .footer a {
        color: #404040;
        text-decoration: underline;
      }
      .badge {
        display: inline-block;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #0f0f12;
        background: #ecfccb;
        border: 1px solid #4d7c0f;
        padding: 7px 12px;
        border-radius: 999px;
        white-space: nowrap;
      }
      .icon-circle {
        width: 52px;
        height: 52px;
        border-radius: 999px;
        background: #ecfccb;
        border: 1px solid #bbf7d0;
        text-align: center;
        line-height: 52px;
        font-size: 22px;
        margin-bottom: 16px;
        color: {{ brand_green }};
      }
      .hero-media {
        margin: 0 32px 20px;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid #e5e7eb;
        background: #111827;
      }
      .hero-media img {
        display: block;
        width: 100%;
        max-width: 536px;
        height: auto;
      }
      .hero-media-caption {
        padding: 14px 18px;
        background: rgba(15, 15, 18, 0.88);
      }
      .hero-media-title {
        display: block;
        font-size: 16px;
        font-weight: 800;
        color: #ffffff;
        margin-bottom: 4px;
      }
      .hero-media-price {
        display: block;
        font-size: 18px;
        font-weight: 800;
        color: #d9f99d;
      }
      .message-card {
        margin: 0 32px 16px;
      }
      .message-meta {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 800;
        color: #0f0f12;
      }
      .message-time {
        margin: 0 0 12px;
        font-size: 12px;
        color: #575757;
      }
      .message-bubble {
        margin: 0;
        padding: 16px 18px;
        border-radius: 16px;
        border: 1px solid #e5e7eb;
        background: #ffffff;
        font-size: 15px;
        line-height: 1.65;
        color: #404040;
      }
      .step-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .step-item {
        margin: 0 0 14px;
        font-size: 14px;
        line-height: 1.55;
        color: #404040;
      }
      .step-item:last-child {
        margin-bottom: 0;
      }
      .step-number {
        display: inline-block;
        width: 24px;
        height: 24px;
        margin-right: 10px;
        border-radius: 999px;
        background: {{ accent_color }};
        color: {{ accent_text_color }};
        border: 1px solid #9db820;
        font-size: 12px;
        font-weight: 800;
        text-align: center;
        line-height: 24px;
        vertical-align: top;
      }
      .benefit-item {
        margin: 0 0 14px;
        font-size: 15px;
        line-height: 1.65;
        color: #404040;
      }
      .benefit-item:last-child {
        margin-bottom: 0;
      }
      .benefit-check {
        color: {{ brand_green }};
        font-weight: 800;
        margin-right: 6px;
      }
      .pre-wrap {
        white-space: pre-wrap;
      }
      @media only screen and (max-width: 620px) {
        .wrapper {
          padding: 16px 8px;
        }
        .header,
        .hero,
        .content,
        .actions,
        .section,
        .note,
        .footer {
          padding-left: 20px !important;
          padding-right: 20px !important;
        }
        .card,
        .hero-media,
        .message-card {
          margin-left: 20px !important;
          margin-right: 20px !important;
        }
        .title {
          font-size: 24px;
        }
        .btn-secondary {
          display: block;
          margin: 10px 0 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <div class="header">
          <table class="header-table" cellpadding="0" cellspacing="0" role="presentation">
            <tr>
              <td align="left" valign="middle">
                <img
                  class="logo"
                  src="{{ logo_url }}"
                  alt="{{ brand_name }}"
                  width="148"
                />
              </td>
              <td align="right" valign="middle">
                {% block header_badge %}{% endblock %}
              </td>
            </tr>
          </table>
        </div>
        {% block hero %}{% endblock %}
        {% block content %}{% endblock %}
        {% block actions %}{% endblock %}
        {% block extra %}{% endblock %}
        <div class="footer">
          <p>{{ company_address }}</p>
          <p>
            <a href="{{ help_center_url }}">Help center</a>
            {% block footer_links %}{% endblock %}
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
